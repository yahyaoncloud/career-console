<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yahya - Cloud Engineer Portfolio</title>
    <meta name="description" content="Portfolio and engineering blog of Yahya, a Cloud Engineer specializing in AWS, Infrastructure as Code, and scalable systems." />
    <meta name="keywords" content="Cloud Engineer, AWS, DevOps, Kubernetes, Terraform, Golang" />
    <meta name="author" content="Yahya" />
    <meta property="og:title" content="Yahya - Cloud Engineer Portfolio" />
    <meta property="og:description" content="Explore my infrastructure projects, case studies, and engineering blog." />
    <meta property="og:type" content="website" />

    <!-- Preconnect: opens DNS + TLS to Google Fonts CDN before the browser requests them -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Non-blocking font load:
      media="print" makes the browser load this with background priority (non-render-blocking).
      onload switches it to media="all" once downloaded, applying the fonts instantly.
      font-display=swap in the URL prevents invisible text during load (FOIT).
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700&display=swap" />
    </noscript>

    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (localTheme === 'dark' || (!localTheme && sysTheme)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
